<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Envelope body -->
  <rect x="10" y="28" width="100" height="62" rx="8" stroke="url(#grad)" stroke-width="3" fill="none"/>
  <!-- Envelope flap (top triangle) -->
  <path d="M10 28 L60 62 L110 28" stroke="url(#grad)" stroke-width="3" fill="none" stroke-linejoin="round"/>
  <!-- Python snake icon in center -->
  <g transform="translate(60, 56)">
    <circle cx="0" cy="0" r="8" fill="url(#grad)" opacity="0.15"/>
    <path d="M-4 0 L-1 4 L1 4 L4 0 L1 -4 L-1 -4 Z" fill="url(#grad)"/>
  </g>
  <!-- Fastmail FM monogram below -->
  <text x="60" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1E3A5F" letter-spacing="2">PY</text>
</svg>