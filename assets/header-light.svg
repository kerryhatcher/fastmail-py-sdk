<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bgGradL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="textGradL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="envGradL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGradL)"/>

  <!-- Decorative elements -->
  <circle cx="1050" cy="60" r="120" fill="#2563EB" opacity="0.04"/>
  <circle cx="1020" cy="240" r="80" fill="#06B6D4" opacity="0.06"/>
  <circle cx="160" cy="200" r="60" fill="#2563EB" opacity="0.03"/>

  <!-- Grid -->
  <g opacity="0.02" stroke="#2563EB" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- Envelope icon -->
  <g transform="translate(100, 90)">
    <rect x="0" y="20" width="90" height="58" rx="6" stroke="url(#envGradL)" stroke-width="2.5" fill="none"/>
    <path d="M0 20 L45 52 L90 20" stroke="url(#envGradL)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <g transform="translate(45, 46)">
      <circle cx="0" cy="0" r="9" fill="#06B6D4" opacity="0.12"/>
      <path d="M-5 0 L-1.5 5 L1.5 5 L5 0 L1.5 -5 L-1.5 -5 Z" fill="#06B6D4" opacity="0.6"/>
    </g>
  </g>

  <!-- Small icons -->
  <g transform="translate(230, 155)" opacity="0.3">
    <rect x="0" y="4" width="28" height="26" rx="3" stroke="#0891B2" stroke-width="1.5" fill="none"/>
    <line x1="0" y1="12" x2="28" y2="12" stroke="#0891B2" stroke-width="1.5"/>
    <line x1="7" y1="0" x2="7" y2="8" stroke="#0891B2" stroke-width="1.5"/>
    <line x1="21" y1="0" x2="21" y2="8" stroke="#0891B2" stroke-width="1.5"/>
    <text x="14" y="25" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0891B2" font-weight="600">15</text>
  </g>

  <g transform="translate(280, 155)" opacity="0.3">
    <rect x="0" y="0" width="28" height="30" rx="4" stroke="#1D4ED8" stroke-width="1.5" fill="none"/>
    <circle cx="14" cy="10" r="4" stroke="#1D4ED8" stroke-width="1.5" fill="none"/>
    <path d="M5 25 Q5 20 14 20 Q23 20 23 25" stroke="#1D4ED8" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Title -->
  <text x="80" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#textGradL)" letter-spacing="-1">fastmail-py-sdk</text>

  <!-- Tagline -->
  <text x="82" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748B" letter-spacing="0.5">Python SDK for Fastmail — email, calendars, and contacts</text>

  <!-- Feature pills -->
  <g transform="translate(80, 176)">
    <rect x="0" y="0" width="62" height="24" rx="12" fill="#2563EB" opacity="0.1"/>
    <text x="31" y="16" text-anchor="middle" font-family="system-ui, monospace" font-size="11" fill="#2563EB">JMAP</text>

    <rect x="72" y="0" width="68" height="24" rx="12" fill="#0891B2" opacity="0.1"/>
    <text x="106" y="16" text-anchor="middle" font-family="system-ui, monospace" font-size="11" fill="#0891B2">CalDAV</text>

    <rect x="150" y="0" width="76" height="24" rx="12" fill="#0891B2" opacity="0.1"/>
    <text x="188" y="16" text-anchor="middle" font-family="system-ui, monospace" font-size="11" fill="#0891B2">CardDAV</text>

    <rect x="236" y="0" width="68" height="24" rx="12" fill="#2563EB" opacity="0.08"/>
    <text x="270" y="16" text-anchor="middle" font-family="system-ui, monospace" font-size="11" fill="#3B82F6">Pydantic</text>

    <rect x="314" y="0" width="52" height="24" rx="12" fill="#2563EB" opacity="0.08"/>
    <text x="340" y="16" text-anchor="middle" font-family="system-ui, monospace" font-size="11" fill="#3B82F6">Async</text>
  </g>

  <!-- Bottom bar -->
  <rect x="80" y="232" width="1040" height="1" fill="#CBD5E1" opacity="0.5"/>
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8" letter-spacing="0.5">A Python port of the Rust fastmail-cli · MIT Licensed</text>
</svg>