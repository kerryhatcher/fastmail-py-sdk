<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="fastmail-py-sdk banner">
  <title>fastmail-py-sdk</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16171f"/>
      <stop offset="1" stop-color="#1f2136"/>
    </linearGradient>
    <linearGradient id="chipBg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1b26"/>
      <stop offset="1" stop-color="#282a44"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- decorative faint brackets -->
  <text x="1010" y="230" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="260" fill="#7dcfff" opacity="0.06" font-weight="700">{</text>
  <text x="1110" y="230" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="260" fill="#e0af68" opacity="0.06" font-weight="700">}</text>

  <!-- faint code lines for terminal texture -->
  <g font-family="ui-monospace, 'Cascadia Code', monospace" font-size="14" fill="#7dcfff" opacity="0.14">
    <text x="720" y="60">async def send(msg: Message) -&gt; Envelope:</text>
    <text x="750" y="82">await jmap.submit(msg)</text>
    <text x="720" y="250">&gt;&gt;&gt; client.contacts.list()</text>
  </g>

  <!-- icon: terminal chip fused with envelope, scaled up -->
  <g transform="translate(70,70)">
    <rect x="0" y="0" width="160" height="160" rx="26" fill="url(#chipBg2)" stroke="#3b3d57" stroke-width="2"/>
    <rect x="34" y="52" width="92" height="66" rx="7" fill="none" stroke="#7dcfff" stroke-width="5"/>
    <path d="M34 55 L80 92 L126 55" fill="none" stroke="#7dcfff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M52 128 L70 110 L52 92" fill="none" stroke="#9ece6a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="80" y="105" width="16" height="11" fill="#e0af68">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- wordmark -->
  <g font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', 'Roboto Mono', Menlo, Consolas, monospace" font-weight="700">
    <text x="270" y="150" font-size="64" fill="#c0caf5">fastmail<tspan fill="#e0af68">-py-sdk</tspan></text>
  </g>

  <!-- tagline -->
  <text x="272" y="195" font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', monospace" font-size="22" fill="#9aa5ce">
    Async Python SDK for Fastmail — email, calendars, contacts
  </text>

  <!-- prompt-style footer accent -->
  <g font-family="ui-monospace, SFMono-Regular, 'Cascadia Code', monospace" font-size="18" fill="#9ece6a">
    <text x="272" y="232">$ pip install fastmail-py-sdk</text>
  </g>
</svg>
